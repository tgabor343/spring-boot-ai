services:
  postgres:
    image: postgres:16-alpine
    container_name: spring-boot-ai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: spring_boot_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spring_boot_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
